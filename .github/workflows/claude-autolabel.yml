name: Auto-label PRs for Claude review

# Adds the `claude-review` label to PRs on open / sync / reopen / ready-for-review.
# The label triggers the separate claude-review.yml workflow (tag mode, where
# use_sticky_comment actually works — see anthropics/claude-code-action#1108).
#
# Required: a repo label named `claude-review`. Create once with:
#   gh label create claude-review --color 0E8A16 --description "Trigger Claude PR review"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "website/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  pull-requests: write

concurrency:
  group: claude-autolabel-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    # Skip drafts so we don't trigger a review on work-in-progress PRs.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Add claude-review label
        # No checkout needed — pass --repo explicitly so gh doesn't try to
        # infer it from a non-existent .git directory.
        # `|| true` makes re-adds idempotent (synchronize fires on every push;
        # if the label is already present, gh exits non-zero).
        run: gh pr edit "$PR" --repo "$REPO" --add-label claude-review || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
