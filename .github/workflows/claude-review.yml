name: Claude Review

# Tag-mode review triggered by the `claude-review` label.
# The label is applied automatically by claude-autolabel.yml on PR open/sync.
# Tag mode is required because use_sticky_comment is a no-op in agent mode
# (anthropics/claude-code-action#1108) — track_progress: true forces tag mode.
#
# Required repository secret: ANTHROPIC_API_KEY.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  # actions: read lets the action load its github_ci MCP server so reviews can
  # reference CI status. Was `write` previously — read is sufficient.
  actions: read

concurrency:
  # One review per PR at a time. Re-labeling (or autolabel firing on a new
  # push) cancels the in-flight review so we always comment on the latest diff.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event.label.name == 'claude-review' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-sonnet-4-5
          # track_progress: true forces tag mode. In tag mode the action
          # creates an initial sticky comment, passes its ID to the MCP
          # comment server, and Claude updates it as the final step.
          # Without this, agent mode runs and the sticky comment silently
          # never publishes — see anthropics/claude-code-action#1108.
          track_progress: true
          use_sticky_comment: true
          prompt: |
            You are reviewing a pull request against `main`. Read the diff,
            then OUTPUT your review as your final Markdown message. The
            action will publish your final message as a sticky review
            comment on the PR — you do not need to call any tool.

            Keep the comment under 400 words. Cover:

            1. **Correctness risks** — bugs, off-by-one errors, broken
               invariants. Cite file:line. Skip stylistic nits.
            2. **Security / safety** — auth, secrets, untrusted input,
               injection, file/network sandboxing. Cite file:line.
            3. **Tests** — coverage gaps, brittle assertions, flake risks.
            4. **Migration / compatibility** — schema changes, breaking
               API edits, data migration safety.

            Clean diff → one-line "LGTM — no blocking issues."
            Do NOT restate the PR description. Always produce output —
            silence is a failure mode.
